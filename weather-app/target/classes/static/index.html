<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Meteo Open-Meteo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>App Meteo</h1>
      <p>Inserisci il nome di una città per visualizzare temperatura, condizioni e descrizione in modo semplice e chiaro.</p>
    </header>

    <section class="card">
      <div class="form-row">
        <label for="city">Nome città (puoi inserire più città separate da una virgola)</label>
        <input type="text" id="city" placeholder="Rome, Milan, Paris" />
        <button id="checkWeather">Mostra meteo</button>
      </div>
      <div id="result"></div>
    </section>
  </div>

  <script src="weather-api.js"></script>
  <script>
    const button = document.getElementById('checkWeather');
    const result = document.getElementById('result');

    button.addEventListener('click', async () => {
      const citiesInput = document.getElementById('city').value;
      const cities = citiesInput
        .split(',')
        .map(item => item.trim())
        .filter(item => item.length > 0);

      if (cities.length === 0) {
        result.innerHTML = '<div class="result-card error">Inserisci almeno una città valida.</div>';
        return;
      }

      result.innerHTML = '<div class="result-card">Caricamento...</div>';

      try {
        const weatherPromises = cities.map(async city => {
          try {
            const data = await getCurrentWeatherByCity(city);
            return { success: true, data };
          } catch (error) {
            return { success: false, city, message: error.message };
          }
        });

        const results = await Promise.all(weatherPromises);
        result.innerHTML = `
          <div class="results-grid">
            ${results.map(item => {
              if (!item.success) {
                return `
                  <div class="weather-card error-card">
                    <h3>${item.city}</h3>
                    <p>Errore: ${item.message}</p>
                  </div>
                `;
              }

              return `
                <div class="weather-card">
                  <div class="weather-result-header">
                    <img class="weather-icon" src="${item.data.icon.src}" alt="${item.data.icon.alt}" />
                    <div>
                      <p><strong>${item.data.city}</strong></p>
                      <p>${item.data.temperature} °C</p>
                    </div>
                  </div>
                  <p>${item.data.description}</p>
                  <div class="weather-stats">
                    <div class="weather-stat">
                      <span class="weather-stat-value">${item.data.humidity ?? '-'}%</span>
                      <span class="weather-stat-label">Umidità</span>
                    </div>
                    <div class="weather-stat">
                      <span class="weather-stat-value">${item.data.windSpeed ?? '-'} km/h</span>
                      <span class="weather-stat-label">Vento</span>
                    </div>
                    <div class="weather-stat">
                      <span class="weather-stat-value">${item.data.precipitation ?? '-'} mm</span>
                      <span class="weather-stat-label">Pioggia</span>
                    </div>
                  </div>
                  <div class="forecast-section small">
                    <h3>Prossimi 5 giorni</h3>
                    <div class="forecast-list">
                      ${item.data.forecast.map(day => `
                        <div class="forecast-day">
                          <span class="forecast-day-date">${day.date}</span>
                          <span class="forecast-day-temp">${day.minTemperature}° / ${day.maxTemperature}°</span>
                        </div>
                      `).join('')}
                    </div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        `;
      } catch (error) {
        result.innerHTML = `<div class="result-card error">Errore: ${error.message}</div>`;
      }
    });
  </script>
</body>
</html>
